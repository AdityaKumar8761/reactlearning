<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <style>
        .body{
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 0px;
            margin-bottom: 0px;
        }
        .sendbutton{
            background-color: green;
            color: white;
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        .chatinput{
            margin-top: 0px;
            margin-bottom: 0px;
            padding: 12px 15px;
            border-radius: 10px;
            border-width: 1px;
            font-size: 15px;

            flex-grow: 1;
        }
        .chat{
            display: flex;

        }
        .app{
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;

            height: 98vh;
        }
        .user{
            display: flex;
            justify-content: end;
            align-items: start;

        }
        .robot{
            display: flex;
            justify-content: baseline;
            align-items: start;
        }
        .chatmessage{
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            border-radius: 10px;
            margin-right: 10px;
            margin-bottom: 20px;
            max-width: 300px;

        }
        .chatmessagecomp{
            flex-grow: 1;
            margin-top: 20px;
            overflow: scroll;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">








        function ChatInput({ chatMessages , setChatMessage}){
            const [inputText , setInputText] = React.useState('')
            function saveInputText(event){
                setInputText(event.target.value);
            }

            function sendMessage(){
                const newChatMessages=[
                    ...chatMessages,   // spread operator to coppy an array
                    {
                        message: inputText,
                        sender: 'user',
                        id: crypto.randomUUID()  //generate random id(java script code)
                    }
                ]
                setChatMessage(newChatMessages);

                const response = Chatbot.getResponse(inputText);

                setChatMessage([
                    ...newChatMessages,
                    {
                        message: response,
                        sender: 'robot',
                        id: crypto.randomUUID()
                    }
                ])

                setInputText('');
            }

            return (  //fragment <> </> does not insert div full work like a div

                <div className="chat">   
                    <input 
                        placeholder="Send a message to Chatbot" 
                        size="30"
                        onChange={saveInputText}
                        value={inputText}   // this make the text box empty  //controlled input 
                        className = "chatinput"
                        onKeyDown={(e) => {
                            if (e.key === "Enter") {
                                    sendMessage();
                                }
                            }}
                    />
                    <button
                        onClick={sendMessage}    
                        className="sendbutton"
                    >Send</button>
                </div>
            );
        }











      //function that set the chatMessage data as props  
      //this function is being used by the chatMessages

        function ChatMessage(props){            //destructuring function ChatMessage({ message, sender })
                                                //probs == variable similar
            const { message } = props;
            const sender = props.sender;        // alternative advancd
                                                 // const { message,sender } = props;

            return (
                <div className={sender === 'user' ? "user" : "robot"}>
                    {sender === 'robot' && (
                        <img src="robot.png" width="50" />)
                    }
                    <div className="chatmessage">
                        {message} 
                    </div>
                    {sender === 'user' && (
                        <img src="user.png" width="50" />
                    )}
                </div>
            )
        }





        //lifiting the stateUP 
        //move the chatMessage, setChatMessage to App form chatmessages






        function ChatMessages({ chatMessages }){
            const chatMessagesRef = React.useRef(null);


            React.useEffect(() => {} , [chatMessages])
                const containerElem = chatMessagesRef.current
                if(containerElem){
                    containerElem.scrollTop = containerElem.scrollHeight;
                }
            return (
            <div className="chatmessagecomp"
            ref={chatMessagesRef}>
            { chatMessages.map((chatMessage)=>{
                    return(
                            <ChatMessage 
                                message ={chatMessage.message}
                                sender = {chatMessage.sender}
                                key = {chatMessage.id}
                            />
                    );
            })}
        </div>
    )}















    //APP function

        function App(){

            //react useState return array
            const [chatMessages , setChatMessage]=React.useState(()=>{
                return(
            [])});

             //array destructuring 
            //const chatMessages = array[0];  //first value of useState is an array
            //const setChatMessage = array[1];  //second value of useState is a function -->updater fundtion

            //react state end 


             // next step
        //map create a new array and perform the operation or function given in the array    // array.map((value , index , array)=>{operation/function})
            return(
            <div className="app">  
                <ChatMessages
                chatMessages ={chatMessages}
                />
                <ChatInput 
                    chatMessages ={chatMessages}
                    setChatMessage = {setChatMessage}
                    />

            </div>
        )
        }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>

</body>
</html>
